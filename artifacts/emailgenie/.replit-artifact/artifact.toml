kind = "web"
previewPath = "/"
title = "EmailGenie"
version = "1.0.0"
id = "artifacts/emailgenie"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24945

[services.development]
run = "pnpm --filter @workspace/emailgenie run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/emailgenie", "run", "build" ]
publicDir = "artifacts/emailgenie/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24945"
BASE_PATH = "/"
